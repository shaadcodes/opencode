<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="cardStyle.css" />
    <title>LinkedIn Profile Card</title>
  </head>
  <body>
    <div class="cardcontainer">
      <div class="card">
        <div class="image">
          <img src="ProfileLinkedIn.png" alt="LinkedIn Profile" />
        </div>
        <div class="text">
          <h2>ShaadCodes</h2>
          <p>
            This is my LinkedIn profile where I have been trying to analyze and
            learn algorithms and implement optimized solutions to enhance my
            understanding and problem-solving skills.
          </p>
        </div>
        <div class="gitbutton">
          <img src="github_PNG47.webp" alt="GitHub Logo">
          <div class="division"></div>
          <div class="gbuttontext">
            <p>GitHub Repository</p>
            <p id="opencode">opencode</p>
          </div>
          <div id="visitrepo">
            <a href="github.com/shaadcodes/opencode">Visit</a>
            <img src="search-explore-white-icon-transparent-png-701751695037015aogz4s2rh6.png" alt="Visit GitHub">
          </div>
        </div>
        <div class="linkedinbutton">
          <p>Proceed To LinkedIn Profile</p>
        </div>
      </div>
    </div>
  </body>
</html>
