<!-- 7. The Local Storage Manager:
     You are working on a note-taking app, and you want to implement a function named saveNoteToLocalStorage that takes a note object and saves it to the browser's local storage. -->

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Note Taker</title>
    <style>
        *
        {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }
        body
        {
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #2c1c1c;
            height: 50rem;
        }
        .container
        {
            width: 50%;
            height: 50%;
            background-color: #ff6c6c;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #field
        {
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2rem;
            color: #ffffff;
        }
        #field input
        {
            border: none;
            background-color: transparent;
            color: #ffffff;
        }
        #field button
        {
            border: none;
            padding: 1rem;
            background-color: #ffffff;
            color: #ff6c6c;
            transition: all 0.3s;
        }
        #field button:hover
        {
            scale: 1.1;
            color: #793232;
        }
        #field input:focus
        {
            outline: none;
        }
        ::placeholder
        {
            color: rgb(234, 234, 234);
        }
    </style>
  </head>
  <body>
    <div class="container">
        <div id="field">
            <div class="rtext">What's on your mind?</div>
            <input type="text" id="note" placeholder="Type here...">
            <button id="saveButton">Save Note</button>
        </div>
    </div>
  </body>
  <script>
        let noteInput = document.getElementById("note");
        let saveButton = document.getElementById("saveButton");
        let field = document.getElementById("field");
        let noteText = noteInput.value;

        if (localStorage.getItem("note"))
        {
            document.querySelector(".rtext").innerHTML = localStorage.getItem("note");
        }

        saveButton.addEventListener("click", () => {
            let noteInput = document.getElementById("note");
            let noteText = noteInput.value;
            localStorage.setItem("note" , noteText);
            document.querySelector(".rtext").innerHTML = localStorage.getItem("note");
        })
    </script>
</html>
